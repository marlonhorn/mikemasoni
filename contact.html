<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CONTACT | MIKE MASONI</title>
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./index.html">MIKE MASONI</a>
      <button class="menu-toggle" type="button" aria-label="Open menu" data-menu-toggle>MENÜ</button>
      <nav class="nav" data-menu>
        <a href="./index.html">HOME</a>
        <a href="./about.html">ABOUT</a>
        <a href="./contact.html" aria-current="page">CONTACT</a>
      </nav>
    </header>

    <main class="page-main">
      <section class="contact-grid reveal">
        <div>
          <p class="eyebrow">CONTACT</p>
          <h1>LET'S WORK TOGETHER</h1>
          <p>EMAIL: <a href="mailto:creative.progress@yahoo.de">creative.progress@yahoo.de</a></p>
          <p>
            INSTAGRAM:
            <a href="https://instagram.com/mikemasoni_official" target="_blank" rel="noreferrer"
              >instagram/mikemasoni_official/</a
            >
          </p>
        </div>

        <form class="contact-form" action="https://formsubmit.co/creative.progress@yahoo.de" method="POST">
          <input type="hidden" name="_captcha" value="false" />
          <input type="hidden" name="_subject" value="NEW WEBSITE CONTACT REQUEST" />
          <input type="hidden" name="_template" value="table" />

          <label for="name">NAME</label>
          <input id="name" name="name" type="text" required />

          <label for="email">EMAIL</label>
          <input id="email" name="email" type="email" required />

          <label for="message">MESSAGE</label>
          <textarea id="message" name="message" rows="6" required></textarea>

          <button type="submit">SEND</button>
        </form>
      </section>
    </main>

    <script src="./assets/js/main.js"></script>
  </body>
</html>
