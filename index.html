<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MIKE MASONI</title>
    <meta name="description" content="Mike Masoni gallery featuring Emotion, Fashion, Stills and Celebs." />
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./index.html">MIKE MASONI</a>
      <button class="menu-toggle" type="button" aria-label="Open menu" data-menu-toggle>MENÜ</button>
      <nav class="nav" data-menu>
        <a href="./index.html">HOME</a>
        <a href="./about.html">ABOUT</a>
        <a href="./contact.html">CONTACT</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <img class="hero-image" src="./public/media/FASHION1aa.jpg" alt="Mike Masoni fashion hero" />
        <div class="hero-overlay"></div>
        <div class="hero-content">
          <h1 class="hero-title">
            <span class="hero-name">MIKE MASONI</span>
            <span class="hero-main">PHOTO &amp; VIDEOGRAPH</span>
          </h1>
        </div>
      </section>

      <section class="category-section reveal" id="emotion">
        <div class="category-head">
          <span>01 / GALLERY</span>
          <h2>EMOTION</h2>
        </div>
        <div class="carousel" data-carousel="3000">
          <div class="slides">
            <article class="slide"><img src="./public/media/EMOTION1.jpg" alt="Emotion category image 1" /></article>
            <article class="slide"><img src="./public/media/STILLS2.jpg" alt="Emotion category image 2" /></article>
            <article class="slide"><img src="./public/media/mikemasoniSTILLS1.jpg" alt="Emotion category image 3" /></article>
          </div>
        </div>
      </section>

      <section class="category-section reveal" id="fashion">
        <div class="category-head">
          <span>02 / GALLERY</span>
          <h2><a href="./fashion.html">FASHION</a></h2>
        </div>
        <div class="carousel" data-carousel="3000">
          <div class="slides">
            <article class="slide"><img src="./public/media/FASHION1aa.jpg" alt="Fashion category image 1" /></article>
            <article class="slide"><img src="./public/media/EMOTION1.jpg" alt="Fashion category image 2" /></article>
            <article class="slide"><img src="./public/media/STILLS1.jpg" alt="Fashion category image 3" /></article>
          </div>
        </div>
      </section>

      <section class="category-section reveal" id="stills">
        <div class="category-head">
          <span>03 / GALLERY</span>
          <h2>STILLS</h2>
        </div>
        <div class="carousel" data-carousel="3000">
          <div class="slides">
            <article class="slide"><img src="./public/media/STILLS1.jpg" alt="Stills category image 1" /></article>
            <article class="slide"><img src="./public/media/STILLS2.jpg" alt="Stills category image 2" /></article>
            <article class="slide"><img src="./public/media/mikemasoniSTILLS1.jpg" alt="Stills category image 3" /></article>
          </div>
        </div>
      </section>

      <section class="category-section reveal" id="celebs">
        <div class="category-head">
          <span>04 / GALLERY</span>
          <h2>CELEBS</h2>
        </div>
        <div class="carousel" data-carousel="3000">
          <div class="slides">
            <article class="slide"><img src="./public/media/CELEBS1.jpg" alt="Celebs category image 1" /></article>
            <article class="slide"><img src="./public/media/EMOTION1.jpg" alt="Celebs category image 2" /></article>
            <article class="slide"><img src="./public/media/STILLS2.jpg" alt="Celebs category image 3" /></article>
          </div>
        </div>
      </section>
    </main>

    <script src="./assets/js/main.js"></script>
  </body>
</html>
